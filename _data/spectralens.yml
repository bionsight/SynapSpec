name: "SpectraLens"
tagline: "Targeted DIA peak inspection for the precursor you care about"
description: "A lightweight desktop tool for quickly checking precursor and fragment peaks in DIA raw files without running a full DIA analysis pipeline."
repository_url: "https://github.com/bionsight/SpectraLens"
release_url: "https://github.com/bionsight/SpectraLens/releases/tag/v0.4.3"
contact_url: "mailto:contact@bionsight.com"
status_label: "Alpha preview"

download:
  version: "0.4.3"
  macos_url: "https://d35ag17soow82e.cloudfront.net/0.4.3/SpectraLens-macos-0.4.3.dmg"
  windows_url: "https://d35ag17soow82e.cloudfront.net/0.4.3/SpectraLens-windows-0.4.3.msi"

highlights:
  - label: "Targeted"
    value: "Precursor-first"
  - label: "Views"
    value: "MS1 and MS2 XIC"
  - label: "Context"
    value: "iRT, RT, spectra"
  - label: "Output"
    value: "CSV export"

features:
  - title: "Precursor-centered inspection"
    icon: "fas fa-crosshairs"
    text: "Add the peptide sequence and charge state you want to verify, then inspect only the targeted signal instead of processing the full experiment."
  - title: "Interactive XIC views"
    icon: "fas fa-chart-line"
    text: "Review precursor-level MS1 XICs and fragment-level MS2 XICs with linear or log scale, legends, and optional TIC or base peak overlays."
  - title: "iRT and charge prediction"
    icon: "fas fa-brain"
    text: "Use model-based iRT and charge predictions to seed a focused search window when library information is incomplete."
  - title: "Spectrum context"
    icon: "fas fa-wave-square"
    text: "Compare experimental and predicted spectra so a peak can be checked with chromatographic and fragment evidence together."
  - title: "Raw file workspace"
    icon: "fas fa-folder-open"
    text: "Create a local workspace, add raw files, and reuse converted files during repeated precursor checks."
  - title: "Exportable review"
    icon: "fas fa-file-csv"
    text: "Export analysis results as CSV for review notes, sharing, or downstream manual curation."

workflow:
  - title: "Create a workspace"
    text: "Choose a local workspace for raw files, converted files, peptide lists, and analysis settings."
  - title: "Add raw files"
    text: "Select DIA raw files. SpectraLens prepares local analysis-ready files and keeps their status visible."
  - title: "Enter precursors"
    text: "Paste peptide sequences, optional charge suffixes, UniMod modifications, or supported glycan notation."
  - title: "Inspect peaks"
    text: "Run targeted extraction, then switch between iRT-RT, spectra, MS1 XIC, and MS2 XIC tabs."

settings:
  - name: "MS1 tolerance"
    value: "Precursor m/z extraction window in ppm."
  - name: "MS2 tolerance"
    value: "Fragment ion extraction window in ppm."
  - name: "RT window"
    value: "Seconds around the predicted or entered retention time used for targeted XIC extraction."
  - name: "Instrument"
    value: "Mass spectrometer model used for prediction and display context."
  - name: "NCE"
    value: "Normalized collision energy used for predicted fragment spectra."
  - name: "Max fragments"
    value: "Optional cap on the number of fragment ions extracted."
  - name: "Intensity aggregation"
    value: "How intensities inside each tolerance window are combined: sum, mean, or maximum."
